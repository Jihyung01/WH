# 게이트웨이 JWT 검증이 RN 세션 토큰과 충돌해 "Invalid JWT"가 나는 경우가 있어 비활성화.
# 실제 인증은 함수 내부에서 supabase.auth.getUser(jwt)로 수행합니다.
[functions.character-chat]
enabled = true
verify_jwt = false
import_map = "./functions/character-chat/deno.json"
entrypoint = "./functions/character-chat/index.ts"

# character-chat과 동일: Supabase 게이트웨이 JWT 검증이 React Native 세션 액세스 토큰과 충돌해
# "Invalid JWT"가 나는 경우가 있음. 인증은 함수 내부 supabase.auth.getUser(jwt)로 처리.
[functions.generate-ugc-event]
enabled = true
verify_jwt = false
import_map = "./functions/generate-ugc-event/deno.json"
entrypoint = "./functions/generate-ugc-event/index.ts"

# RN/Expo 액세스 토큰이 게이트웨이 JWT 검증과 충돌해 401이 나는 경우가 있음 (character-chat / UGC와 동일).
# 인증은 함수 내부 supabase.auth.getUser(jwt)로 처리.
[functions.delete-account]
enabled = true
verify_jwt = false
entrypoint = "./functions/delete-account/index.ts"
